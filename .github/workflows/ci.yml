name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable, default features)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy (default features)
        run: cargo clippy --release --all-targets -- -D warnings
      - name: Test (release)
        run: cargo test --release

  features:
    name: Feature builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test serde + glam
        run: cargo test --release --features serde,glam
      - name: Lib tests with p5_shadow (canonical evaluator)
        run: cargo test --release --features p5_shadow --lib
      - name: Check simd_scalar backend
        run: cargo check --release --features simd_scalar
      - name: Check single-threaded (no default features)
        run: cargo check --release --no-default-features

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --release
